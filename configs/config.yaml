server:
  host: 0.0.0.0
  port: 8080

database:
  driver: sqlite
  dsn: ./sentinel.db
  pool_size: 10

providers:
  active: copernicus
  copernicus:
    enabled: true
    base_url: https://catalogue.dataspace.copernicus.eu/odata/v1
    download_base_url: https://download.dataspace.copernicus.eu
    token_url: https://identity.dataspace.copernicus.eu/auth/realms/CDSE/protocol/openid-connect/token
    client_id: ""
    client_secret: ""           # 通过环境变量 SENTINEL_CRAWLER_PROVIDERS_COPERNICUS_CLIENT_SECRET 注入
    username: ""
    password: ""                # 通过环境变量 SENTINEL_CRAWLER_PROVIDERS_COPERNICUS_PASSWORD 注入
    timeout: 30
    rate_limit: 10
    max_results_per_query: 1000
  aws:
    enabled: false
    region: eu-central-1
    bucket: ""
    access_key: ""
    secret_key: ""

crawler:
  page_size: 100
  max_concurrency: 5
  retry_attempts: 3
  skip_existing: true

download:
  dest_dir: ./downloads
  workers: 4
  chunk_size: 10485760  # 10MB
  verify_checksum: true
  resume: true

queue:
  driver: memory
  address: ""

scheduler:
  enabled: false
  cron: "0 2 * * *"
  queries: []

log:
  level: info
  format: json

metrics:
  enabled: true
  path: /metrics
  port: 0
